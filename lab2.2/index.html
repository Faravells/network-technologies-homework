<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title> Трансформация и анимация</title>
  <link rel="stylesheet" href="CSS/style.css">
  <script src="JavaScript/d3.v7.min.js"> </script>
  <script src="JavaScript/main.js"></script>
  <script src="JavaScript/image.js"></script>
  <script src="JavaScript/path.js"></script>
</head>
<body>

<form id="setting">
  <p class="wayElems">Координаты рисунка<br>
    <label for="cx">x: </label>
    <input type="number" id="cx" value="300" max="600" min="0">
    <label class="animElems" for="cx2">до</label>
    <input class="animElems" type="number" id="cx2" value="550" max="600" min="0"><br>
    <label for="cy">y: </label>
    <input type="number" id="cy" value="300" max="600" min="0">
    <label class="animElems" for="cy2">до</label>
    <input class="animElems" type="number" id="cy2" value="550" max="600" min="0">
  </p>
  <p id="way">Пути перемещения<br>
    <select id="waySelect">
      <option value="0">Буквой "Г"</option>
      <option value="1">По кругу</option>
    </select>
  </p>
  <p class="wayElems">Масштаб<br>
    <label for="xzoom">по x: </label>
    <input type="number" id="xzoom" value="1" step="0.1" max="10" min="0">
    <label class="animElems" for="xzoom2">до</label>
    <input class="animElems" type="number" id="xzoom2" value="1.5" step="0.1" max="10" min="0"><br>
    <label for="yzoom">по y: </label>
    <input type="number" id="yzoom" value="1" step="0.1" max="10" min="0">
    <label class="animElems" for="yzoom2">до</label>
    <input class="animElems" type="number" id="yzoom2" value="1.5" step="0.1" max="10" min="0">
  </p>
  <p class="wayElems">Поворот<br>
    <label for="angle">угол: </label>
    <input type="number" id="angle" value="0" max="0" min="360">
    <label class="animElems" for="angle">до</label>
    <input class="animElems" type="number" id="angle2" value="180" max="0" min="360">
  </p>
  <p>
    <input id="drawBtn" type="button" value="Нарисовать">
    <input id="clearBtn" type="button" value="Очистить">
  </p>
  <p>
    <input type="checkbox" id="toggleAnim">
    <label for="toggleAnim">Включить анимацию?</label>
    <select id="animationEffect" class="animElems">
      <option value="linear">linear</option>
      <option value="elastic">elastic</option>
      <option value="bounce">bounce</option>
    </select>
  </p>
  <p class="animElems">
    <input type="checkbox" id="toggleWay">
    <label for="toggleWay">Перемещение вдоль пути?</label>
  </p>
  <p>
    <input class="animElems" id="animateBtn" type="button" value="Анимировать">
  </p>
</form>

<svg></svg>

</body>
</html>
