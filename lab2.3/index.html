<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="CSS/style.css">
    <script src="JavaScript/d3.v7.min.js"></script>
    <script src="JavaScript/data.js"></script>
    <script src="JavaScript/main.js"></script>
    <script src="JavaScript/table.js"></script>
    <script src="JavaScript/chart.js"></script>
</head>
<body>
<h3>Список самых высоких зданий</h3>
<form id="setting">
    <p>
        Значение по оси ОХ<br>
        <input type="radio" name="ox" id="country" checked="checked" value="Страна">
        <label for="country">Страна</label><br>
        <input type="radio" name="ox" id="year" value="Год">
        <label for="year">Год</label>
    </p>
    <p id="checkboxP">
        Значение по оси OY<br>
        <input type="checkbox" name="oy" id="maxHeight" checked="checked" value="max">
        <label for="maxHeight">Максимальная высота</label><br>
        <input type="checkbox" name="oy" id="minHeight" value="min">
        <label for="minHeight">Минимальная высота</label>
    </p>
    <p>
        <label for="graphType">Тип графика</label>
        <select id="graphType">
            <option value="0">Точечная диаграмма</option>
            <option value="1">Гистограмма</option>
        </select>
    </p>
    <input id="buildBtn" type="button" value="Построить">
</form>
<svg></svg>
<p>
    <input id="tableBtn" type="button" value="Скрыть таблицу">
</p>
<table id="build">
</table>
</body>
</html>
